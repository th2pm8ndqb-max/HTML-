<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - Athar | النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-right">

    <div id="page-home" class="page active">
        <div class="bg-green-700 p-8 rounded-b-[40px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">أهلاً بك في أثر 👋</h1>
                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">🎯 نقاطك: <span id="user-points">0</span></div>
            </div>
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 text-center">
                <p class="text-sm opacity-90 mb-1">إجمالي المصروفات</p>
                <h2 class="text-4xl font-black"><span id="home-total">0</span> ريال</h2>
            </div>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-gray-800 text-lg mb-4">تحركاتك الأخيرة</h3>
            <div id="transactions-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="p-6">
            <h2 class="text-3xl font-black text-gray-800 mb-8">إضافة مصروف</h2>
            <div class="bg-white p-6 rounded-[30px] shadow-sm space-y-6">
                <input type="number" id="input-amount" class="w-full bg-gray-50 p-5 rounded-2xl text-2xl font-bold text-center outline-none" placeholder="0.00">
                <input type="text" id="input-title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold" placeholder="في ماذا صرفت؟">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCategory('need', this)" id="btn-need" class="border-2 border-green-500 bg-green-50 p-3 rounded-2xl font-bold text-green-700">احتياج</button>
                    <button onclick="setCategory('want', this)" id="btn-want" class="border-2 border-transparent bg-gray-50 p-3 rounded-2xl font-bold text-gray-500">رغبة</button>
                </div>
                <button onclick="processTransaction()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">حفظ الأثر ✅</button>
            </div>
        </div>
    </div>

    <div id="page-reports" class="page">
        <div class="p-6 space-y-6">
            <h2 class="text-3xl font-black text-gray-800 mb-6">التقارير</h2>
            <div id="persona-card" class="p-8 rounded-[40px] text-center shadow-lg bg-gray-100 transition-all duration-500">
                <div id="persona-icon" class="text-6xl mb-4">⏳</div>
                <h3 id="persona-name" class="text-xl font-black">جاري التحليل...</h3>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass h-24 flex justify-around items-center border-t z-50">
        <button onclick="navTo('home')" class="flex flex-col items-center text-green-600"><span>🏠</span><span class="text-[10px] font-bold">الرئيسية</span></button>
        <button onclick="navTo('add')" class="flex flex-col items-center text-gray-400"><span>➕</span><span class="text-[10px] font-bold">إضافة</span></button>
        <button onclick="navTo('reports')" class="flex flex-col items-center text-gray-400"><span>📊</span><span class="text-[10px] font-bold">التقارير</span></button>
    </div>

    <script>
        // إعداداتك الأصلية
        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lHjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- التزبيط التقني: فصل كل جوال بمُعرف خاص ---
        let deviceId = localStorage.getItem('athar_id');
        if (!deviceId) {
            deviceId = 'dev_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('athar_id', deviceId);
        }

        let selectedCategory = 'need';

        window.onload = () => loadData();

        function loadData() {
            // القراءة فقط من مجلد هذا الجهاز
            db.collection("users").doc(deviceId).collection("my_data")
              .orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById('transactions-list');
                list.innerHTML = '';
                let total = 0; let pts = 0;
                let n = 0; let w = 0;

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    total += d.amount;
                    if(d.category === 'need') { n++; pts += 10; } else { w++; pts += 2; }
                    list.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between font-bold border-r-4 ${d.category === 'need' ? 'border-green-500' : 'border-orange-400'}"><span>${d.title}</span><span class="text-green-600">${d.amount} ريال</span></div>`;
                });

                document.getElementById('home-total').innerText = total.toLocaleString();
                document.getElementById('user-points').innerText = pts;
                updatePersona(n, w);
            });
        }

        function processTransaction() {
            const amt = document.getElementById('input-amount').value;
            const ttl = document.getElementById('input-title').value;
            if(!amt || !ttl) return alert("البيانات ناقصة!");

            // الحفظ في مجلد هذا الجهاز فقط
            db.collection("users").doc(deviceId).collection("my_data").add({
                amount: parseFloat(amt), title: ttl, category: selectedCategory,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("تم الحفظ في سحابتك الخاصة! ✅");
                navTo('home');
                document.getElementById('input-amount').value = '';
                document.getElementById('input-title').value = '';
            });
        }

        function updatePersona(n, w) {
            const card = document.getElementById('persona-card');
            const icon = document.getElementById('persona-icon');
            const name = document.getElementById('persona-name');
            if(n === 0 && w === 0) return;
            if(n > w) { card.className = "p-8 rounded-[40px] text-center shadow-lg bg-green-600 text-white"; icon.innerText = "🦅"; name.innerText = "الصقر الحكيم"; }
            else if(w > n) { card.className = "p-8 rounded-[40px] text-center shadow-lg bg-orange-500 text-white"; icon.innerText = "✨"; name.innerText = "المستمتع الذكي"; }
            else { card.className = "p-8 rounded-[40px] text-center shadow-lg bg-blue-600 text-white"; icon.innerText = "⚖️"; name.innerText = "المتوازن"; }
        }

        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
        }

        function setCategory(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('border-green-500', 'border-transparent'));
            btn.classList.replace('border-transparent', 'border-green-500');
        }
    </script>
</body>
</html>
