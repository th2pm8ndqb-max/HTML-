<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="page-home" class="page active">
        <div class="bg-gradient-to-b from-green-700 to-green-600 p-8 rounded-b-[40px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6 text-right">
                <div>
                    <h1 class="text-2xl font-bold">أهلاً بك في أثر 👋</h1>
                    <p id="cloud-status" class="opacity-80 text-[10px]">جاري الاتصال بالسحابة...</p>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">
                    🎯 نقاطك: <span id="user-points">0</span>
                </div>
            </div>
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 text-center">
                <p class="text-sm opacity-90 mb-1">إجمالي المصروفات</p>
                <h2 class="text-4xl font-black mb-4"><span id="home-total">0</span> <span class="text-lg">ريال</span></h2>
            </div>
        </div>
        <div class="p-6 text-right">
            <h3 class="font-bold text-gray-800 text-lg mb-4">تحركاتك الأخيرة (من السحابة)</h3>
            <div id="transactions-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400 text-sm">انتظر قليلاً...</div>
            </div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="p-6 text-right">
            <h2 class="text-3xl font-black text-gray-800 mb-8">إضافة مصروف</h2>
            <div class="bg-white p-6 rounded-[30px] shadow-2xl space-y-6">
                <input type="number" id="input-amount" class="w-full bg-gray-50 p-5 rounded-2xl text-2xl font-bold text-center outline-none" placeholder="0.00">
                <input type="text" id="input-title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold" placeholder="وش صرفت عليه؟">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCategory('need', this)" class="cat-btn border-2 border-green-500 bg-green-50 p-3 rounded-2xl font-bold text-green-700">احتياج</button>
                    <button onclick="setCategory('want', this)" class="cat-btn border-2 border-transparent bg-gray-50 p-3 rounded-2xl font-bold text-gray-500">رغبة</button>
                </div>
                <button onclick="processTransaction()" id="btn-save" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">حفظ سحابي ✅</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass h-24 flex justify-around items-center px-6 border-t z-50">
        <button onclick="navTo('home', this)" class="nav-btn text-green-600 flex flex-col items-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold mt-1">الرئيسية</span>
        </button>
        <button onclick="navTo('add', this)" class="nav-btn text-gray-400 flex flex-col items-center">
            <div class="bg-green-600 text-white p-4 rounded-2xl -mt-14 shadow-lg border-4 border-white">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="text-[10px] font-bold mt-1">إضافة</span>
        </button>
    </div>

    <script>
        // --- إعداداتك السحابية المحدثة ---
        const firebaseConfig = {
            apiKey: "AIzaSyBBQ6UpoyRUh_yt6sTLEpdFF1oESw_3YWo",
            authDomain: "athar-8860c.firebaseapp.com",
            projectId: "athar-8860c",
            storageBucket: "athar-8860c.firebasestorage.app",
            messagingSenderId: "379470747907",
            appId: "1:379470747907:web:2f0ef3474e5cd614f2f136"
        };

        // تشغيل الاتصال
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let total = 0;
        let points = 0;
        let selectedCategory = 'need';

        // تحميل البيانات من السحابة فوراً
        window.onload = loadFromCloud;

        function loadFromCloud() {
            // جلب الإحصائيات
            db.collection("userStats").doc("totals").onSnapshot((doc) => {
                if (doc.exists) {
                    total = doc.data().total || 0;
                    points = doc.data().points || 0;
                    document.getElementById('home-total').innerText = total.toLocaleString();
                    document.getElementById('user-points').innerText = points;
                    document.getElementById('cloud-status').innerText = "متصل بالسحابة 🟢";
                }
            });

            // جلب العمليات
            db.collection("transactions").orderBy("date", "desc").onSnapshot((snapshot) => {
                const list = document.getElementById('transactions-list');
                list.innerHTML = '';
                if (snapshot.empty) {
                    list.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">لا يوجد بيانات.. أضف أول مصروف!</div>';
                    return;
                }
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border border-gray-50 text-right";
                    card.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="bg-green-100 p-3 rounded-2xl text-xl">💰</div>
                            <div>
                                <h4 class="font-black text-gray-800 text-sm">${data.title}</h4>
                                <p class="text-[10px] text-gray-400 font-bold">${data.category === 'need' ? 'احتياج' : 'رغبة'}</p>
                            </div>
                        </div>
                        <div class="text-left font-black text-green-700 text-sm">${data.amount} ريال</div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        async function processTransaction() {
            const amount = parseFloat(document.getElementById('input-amount').value);
            const title = document.getElementById('input-title').value;
            if (!amount || !title) return alert("امسح على وجهك وعبي البيانات 😂");

            const btn = document.getElementById('btn-save');
            btn.innerText = "جاري الحفظ بالسحابة...";
            btn.disabled = true;

            try {
                // حفظ العملية
                await db.collection("transactions").add({
                    title, amount, category: selectedCategory, date: Date.now()
                });
                // تحديث المجموع
                await db.collection("userStats").doc("totals").set({
                    total: total + amount,
                    points: points + (selectedCategory === 'need' ? 10 : 2)
                });

                document.getElementById('input-amount').value = '';
                document.getElementById('input-title').value = '';
                navTo('home', document.querySelectorAll('.nav-btn')[0]);
            } catch (e) {
                alert("فشل الاتصال! تأكد من تفعيل Firestore في وضع الاختبار.");
            } finally {
                btn.innerText = "حفظ سحابي ✅";
                btn.disabled = false;
            }
        }

        function navTo(p, b) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-green-600', 'text-gray-400'));
            if(b) b.classList.replace('text-gray-400', 'text-green-600');
        }

        function setCategory(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('border-green-500', 'border-transparent'));
            btn.classList.replace('border-transparent', 'border-green-500');
        }
    </script>
</body>
</html>
