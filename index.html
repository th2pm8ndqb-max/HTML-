

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر PRO | لوحة التحكم السحابية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d",
            measurementId: "G-R9JJB10JRK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.processEntry = async function() {
            const amt = document.getElementById('amt').value;
            const cat = document.getElementById('cat').value;
            const nec = document.getElementById('nec').value;
            if(!amt) return alert("أدخل المبلغ");
            try {
                await addDoc(collection(db, "expenses"), {
                    amount: parseFloat(amt),
                    category: cat,
                    necessity: nec,
                    timestamp: new Date()
                });
                document.getElementById('amt').value = '';
            } catch (e) { console.error(e); }
        };

        const q = query(collection(db, "expenses"), orderBy("timestamp", "asc"), limit(10));
        onSnapshot(q, (snapshot) => {
            let amounts = [];
            let labels = [];
            let total = 0;
            snapshot.forEach((doc) => {
                const data = doc.data();
                amounts.push(data.amount);
                labels.push(new Date(data.timestamp.seconds * 1000).toLocaleTimeString('ar-SA'));
                total += (data.necessity === 'yes' ? 10 : -5);
            });
            document.getElementById('pts').innerText = total + 100;
            updateChart(amounts, labels);
        });

        let myChart;
        function updateChart(data, labels) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'الإنفاق السحابي',
                        data: data,
                        borderColor: '#27ae60',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });
        }
    </script>
    <style>
        :root { --primary: #27ae60; --secondary: #2980b9; --bg: #f0f3f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .full-width { grid-column: 1 / -1; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; margin: 5px; flex: 1; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; color: var(--secondary); }
        #ai-advice { background: #e8f5e9; border-right: 5px solid var(--primary); padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
        @media (max-width: 600px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="panel full-width">
        <h1 style="margin:0;">أثر PRO 🌱</h1>
        <p style="color: #666;">لوحة التحكم المتصلة سحابياً بـ Google Firestore</p>
    </div>
    <div class="panel">
        <h2>تسجيل عملية 💳</h2>
        <input type="number" id="amt" placeholder="المبلغ (ريال)">
        <select id="cat">
            <option value="food">غذاء</option>
            <option value="coffee">قهوة (V60)</option>
            <option value="edu">تعليم</option>
        </select>
        <select id="nec">
            <option value="yes">ضروري جداً</option>
            <option value="no">كماليات</option>
        </select>
        <button onclick="processEntry()">حفظ وتحليل الأثر</button>
    </div>
    <div class="panel">
        <h2>الإحصائيات السحابية 📊</h2>
        <div style="display:flex;">
            <div class="stat-card"><span>نقاطك</span><span class="stat-val" id="pts">100</span></div>
            <div class="stat-card"><span>الحالة</span><span class="stat-val" id="lvl" style="font-size:14px;">متوازن</span></div>
        </div>
        <div id="ai-advice"><b>💡 نصيحة أثر:</b> استمر في تسجيل بياناتك لتحسين دقة التحليل السحابي.</div>
    </div>
    <div class="panel full-width">
        <h2>تحليل نمط الإنفاق المستدام 📈</h2>
        <canvas id="chart" height="100"></canvas>
    </div>
</div>
</body>
</html>
