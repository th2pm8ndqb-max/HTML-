

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر PRO | النسخة السحابية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك (من صورتك)
        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d",
            measurementId: "G-R9JJB10JRK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جعل الوظائف متاحة للزر
        window.processEntry = async function() {
            const amt = document.getElementById('amt').value;
            const cat = document.getElementById('cat').value;
            const nec = document.getElementById('nec').value;

            if(!amt) return alert("أدخل المبلغ");

            try {
                // إرسال البيانات للسحابة فوراً
                await addDoc(collection(db, "expenses"), {
                    amount: parseFloat(amt),
                    category: cat,
                    necessity: nec,
                    timestamp: new Date()
                });
                document.getElementById('amt').value = '';
                alert("تم الحفظ في السحابة بنجاح! ✅");
            } catch (e) {
                console.error("خطأ في الحفظ: ", e);
            }
        };

        // تحديث الرسم البياني تلقائياً عند وصول بيانات جديدة من السحابة
        const q = query(collection(db, "expenses"), orderBy("timestamp", "asc"), limit(10));
        onSnapshot(q, (snapshot) => {
            let amounts = [];
            let labels = [];
            snapshot.forEach((doc) => {
                amounts.push(doc.data().amount);
                labels.push(new Date(doc.data().timestamp.seconds * 1000).toLocaleTimeString('ar-SA'));
            });
            updateChart(amounts, labels);
        });

        let myChart;
        function updateChart(data, labels) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'نمط الإنفاق السحابي',
                        data: data,
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(46, 204, 113, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                }
            });
        }
    </script>

    <style>
        :root { --primary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .sub { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #eee; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        .chart-container { margin-top: 25px; background: #fafafa; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>أثر PRO 🌱</h1>
    <div class="sub">متصل سحابياً بقاعدة بيانات Google Firestore</div>
    
    <label>كم صرفت اليوم؟</label>
    <input type="number" id="amt" placeholder="المبلغ بالريال">
    
    <label>نوع المصروف</label>
    <select id="cat">
        <option value="food">غذاء</option>
        <option value="coffee">قهوة (V60)</option>
        <option value="trans">مواصلات</option>
        <option value="edu">تعليم</option>
    </select>

    <label>مدى الاحتياج</label>
    <select id="nec">
        <option value="yes">ضروري</option>
        <option value="no">كماليات</option>
    </select>

    <button onclick="processEntry()">حفظ وتحليل الأثر</button>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

</body>
</html>
