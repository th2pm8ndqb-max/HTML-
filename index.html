

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر | Athar 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveData = async function(isNecessary) {
            const amt = document.getElementById('amount').value;
            const cat = document.getElementById('category').value;
            const nec = isNecessary ? 'yes' : 'no';
            
            if(!amt) return alert("أدخل المبلغ أولاً");

            try {
                await addDoc(collection(db, "expenses"), {
                    amount: parseFloat(amt),
                    category: cat,
                    necessity: nec,
                    timestamp: new Date()
                });
                document.getElementById('amount').value = '';
            } catch (e) { console.error(e); }
        };

        const q = query(collection(db, "expenses"), orderBy("timestamp", "asc"), limit(20));
        onSnapshot(q, (snapshot) => {
            let amounts = [];
            let labels = [];
            let score = 100;
            snapshot.forEach((doc) => {
                const d = doc.data();
                amounts.push(d.amount);
                labels.push(""); 
                score += (d.necessity === 'yes' ? 5 : -10);
            });
            document.getElementById('score').innerText = score;
            updateChart(amounts, labels);
        });

        let chart;
        function updateChart(data, labels) {
            const ctx = document.getElementById('chart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#fff',
                        backgroundColor: 'rgba(255,255,255,0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { display: false } }
                }
            });
        }
    </script>

    <style>
        /* التصميم المطابق تماماً لـ Athar-app */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Cairo', sans-serif;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            width: 340px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 32px; }
        .score-val { font-size: 48px; font-weight: bold; margin: 10px 0; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .btn-green { background: #27ae60; }
        .btn-red { background: #e74c3c; }
        .btn:active { transform: scale(0.95); }
        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>أثر 🌱</h1>
    <p>نقاط الاستدامة</p>
    <div class="score-val" id="score">100</div>

    <input type="number" id="amount" placeholder="المبلغ..">
    <select id="category">
        <option value="قهوة">☕ قهوة</option>
        <option value="طعام">🍎 طعام</option>
        <option value="دراسة">📚 دراسة</option>
    </select>

    <div class="btn-group">
        <button class="btn btn-green" onclick="saveData(true)">ضروري ✅</button>
        <button class="btn btn-red" onclick="saveData(false)">كماليات ❌</button>
    </div>

    <canvas id="chart" height="100"></canvas>
</div>

</body>
</html>
