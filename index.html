

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر PRO | لوحة التحكم الاحترافية</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #27ae60; --secondary: #2980b9; --bg: #f0f3f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .dashboard { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .full-width { grid-column: 1 / -1; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; margin: 5px; }
        .stat-val { display: block; font-size: 22px; font-weight: bold; color: var(--secondary); }
        #ai-advice { background: #e8f5e9; border-right: 5px solid var(--primary); padding: 15px; border-radius: 10px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="panel full-width"><h1>أثر PRO 🌱</h1><p>نظام الإدارة المالية المستدامة</p></div>
    <div class="panel">
        <h2>تسجيل عملية 💳</h2>
        <input type="number" id="amt" placeholder="المبلغ (ريال)">
        <select id="cat"><option value="food">غذاء</option><option value="edu">تعليم</option><option value="lux">كماليات</option></select>
        <button onclick="add()">تحليل الأثر</button>
    </div>
    <div class="panel">
        <h2>الحالة الراهنة 📊</h2>
        <div style="display:flex;">
            <div class="stat-card" style="flex:1;"><span>النقاط</span><span class="stat-val" id="pts">100</span></div>
            <div class="stat-card" style="flex:1;"><span>المستوى</span><span class="stat-val" id="lvl" style="font-size:14px;">مبتدئ</span></div>
        </div>
        <div id="ai-advice"><b>💡 نصيحة الخوارزمية:</b> <span id="adv">بانتظار عملياتك..</span></div>
    </div>
    <div class="panel full-width"><h2>تحليل النمط 📈</h2><canvas id="chart" height="100"></canvas></div>
</div>
<script>
    let data = { score: 100, history: [] };
    let myChart;
    function add() {
        const a = document.getElementById('amt').value;
        if(!a) return;
        data.score += 10;
        data.history.push(a);
        document.getElementById('pts').innerText = data.score;
        document.getElementById('adv').innerText = "رائع! استمر في الإنفاق المتوازن لرفع نقاط استدامتك.";
        updateChart();
    }
    function updateChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: data.history.map((_,i)=>i+1), datasets: [{ label: 'الإنفاق', data: data.history, borderColor: '#27ae60', fill: true }] }
        });
    }
    updateChart();
</script>
</body>
</html>
