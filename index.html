
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر PRO | نظام الإدارة المالية المستدامة</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --nature-green: #27ae60;
            --ocean-blue: #2980b9;
            --soft-white: #ffffff;
            --dark-text: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f3f5;
            margin: 0;
            padding: 20px;
            color: var(--dark-text);
        }

        .dashboard {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .panel {
            background: var(--soft-white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .full-width { grid-column: 1 / -1; }

        h2 { color: var(--nature-green); margin-top: 0; font-size: 1.2rem; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background: var(--nature-green);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #219150; transform: translateY(-2px); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--ocean-blue); }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            background: #e1f5fe;
            color: #0288d1;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 5px;
        }

        #ai-advice {
            background: #e8f5e9;
            border-left: 5px solid var(--nature-green);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 15px;
        }

        @media (max-width: 600px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="panel full-width" style="text-align: center;">
        <h1 style="margin:0;">أثر PRO 🌱</h1>
        <p style="color: #666;">نظام ذكي لتحليل الاستدامة المالية والبيئية</p>
    </div>

    <div class="panel">
        <h2>تسجيل عملية 💳</h2>
        <input type="number" id="amount" placeholder="المبلغ (ريال)">
        <select id="category">
            <option value="food">غذاء (أثر بيئي عالي)</option>
            <option value="transport">مواصلات (بصمة كربونية)</option>
            <option value="shop">كماليات (أثر اجتماعي)</option>
            <option value="edu">تعليم (استثمار بشري)</option>
        </select>
        <select id="necessity">
            <option value="essential">ضروري</option>
            <option value="luxury">رفاهية</option>
        </select>
        <button onclick="processTransaction()">تحليل الذكاء المالي</button>
    </div>

    <div class="panel">
        <h2>الحالة الراهنة 📊</h2>
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-val" id="total-score">0</span>
                <span>نقاط الاستدامة</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="eco-impact">0%</span>
                <span>البصمة الخضراء</span>
            </div>
        </div>
        <div id="ai-advice">
            <b>💡 نصيحة أثر الذكية:</b>
            <span id="advice-text">ابدأ بتسجيل عملياتك لتحليل سلوكك المالي.</span>
        </div>
        <div class="stat-card" style="margin-top:10px;">
            <span>المستوى الحالي:</span>
            <span id="level-badge" class="badge">مبتدئ واعي</span>
        </div>
    </div>

    <div class="panel full-width">
        <h2>تحليل الاتجاهات الزمنية 📈</h2>
        <canvas id="mainChart" height="100"></canvas>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('athar_pro_db')) || {
        transactions: [],
        points: 100,
        ecoBalance: 50
    };

    let chart;

    function processTransaction() {
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        const nec = document.getElementById('necessity').value;

        if (!amt) return alert("أدخل المبلغ أولاً");

        // منطق احترافي: حساب النقاط والأثر البيئي
        let ptsChange = (nec === 'essential') ? 5 : -10;
        let ecoChange = (cat === 'transport') ? -5 : (cat === 'edu' ? 10 : 0);

        db.points += ptsChange;
        db.ecoBalance += ecoChange;
        db.transactions.push({amt, cat, date: new Date().toLocaleTimeString()});

        saveAndRefresh();
        updateAdvice(nec, cat);
        document.getElementById('amount').value = '';
    }

    function updateAdvice(nec, cat) {
        let text = "";
        if (nec === 'luxury') text = "انتبه! صرفك على الكماليات يقلل من نقاط استدامتك المالية.";
        if (cat === 'transport') text = "المواصلات تزيد بصمتك الكربونية، فكر في المشي أو النقل الجماعي.";
        if (db.points > 150) text = "أنت الآن في مرحلة 'الحكيم المالي'، استمر في التوازن!";
        
        document.getElementById('advice-text').innerText = text;
    }

    function saveAndRefresh() {
        localStorage.setItem('athar_pro_db', JSON.stringify(db));
        document.getElementById('total-score').innerText = db.points;
        document.getElementById('eco-impact').innerText = Math.max(0, Math.min(100, db.ecoBalance)) + "%";
        
        // تحديث المستوى
        let lvl = "مبتدئ واعي";
        if(db.points > 150) lvl = "مستشار مالي";
        if(db.points > 300) lvl = "خبير استدامة";
        document.getElementById('level-badge').innerText = lvl;

        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: db.transactions.map(t => t.date),
                datasets: [{
                    label: 'حجم الإنفاق',
                    data: db.transactions.map(t => t.amt),
                    borderColor: '#2980b9',
                    backgroundColor: 'rgba(41, 128, 185, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true }
        });
    }

    saveAndRefresh();
</script>

</body>
</html>
