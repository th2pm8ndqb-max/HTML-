
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أثر PRO | النموذج الأولي (Prototype)</title>
    <style>
        /* فلسفة التصميم: بسيطة، مريحة للعين، وعصرية */
        body {
            background-color: #dcdde1; /* رمادي هادئ */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .phone-mockup {
            width: 320px;
            height: 600px;
            background: #f5f6fa;
            border-radius: 40px;
            border: 8px solid #2f3640;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 { color: #27ae60; font-size: 24px; margin: 0; }
        .header p { font-size: 12px; color: #7f8c8d; }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .points { font-size: 32px; font-weight: bold; color: #2980b9; }

        .input-group {
            background: #eee;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
        }

        .dummy-input {
            background: white;
            height: 40px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            padding-right: 10px;
            color: #999;
            font-size: 12px;
        }

        .btn-prototype {
            background: #27ae60;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .chart-placeholder {
            margin-top: 30px;
            height: 100px;
            background: linear-gradient(90deg, transparent 50%, rgba(39,174,96,0.1) 50%);
            background-size: 20px 100%;
            border-bottom: 2px solid #27ae60;
            position: relative;
        }
        
        .chart-line {
            position: absolute;
            top: 40px; width: 100%; height: 2px;
            background: #27ae60;
            transform: rotate(-5deg);
        }
    </style>
</head>
<body>

<div class="phone-mockup">
    <div class="header">
        <h1>أثر PRO 🌱</h1>
        <p>التخطيط الأولي للواجهة</p>
    </div>

    <div class="stat-card">
        <span style="font-size: 14px; color: #666;">نقاطك الحالية</span>
        <div class="points">100</div>
        <div style="color: #27ae60; font-size: 12px;">مستدام ✅</div>
    </div>

    <div class="input-group">
        <div class="dummy-input">المبلغ...</div>
        <div class="dummy-input">التصنيف (غذاء، قهوة...)</div>
        <div class="dummy-input">هل هو ضروري؟</div>
        <div class="btn-prototype">حفظ الأثر</div>
    </div>

    <div class="chart-placeholder">
        <div class="chart-line"></div>
        <p style="font-size: 10px; text-align: center; margin-top: 80px; color: #7f8c8d;">نموذج تجريبي للرسم البياني</p>
    </div>
</div>

</body>
</html>
