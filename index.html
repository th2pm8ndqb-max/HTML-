<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - Athar | النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-right">

    <div id="page-home" class="page active">
        <div class="bg-gradient-to-b from-green-700 to-green-600 p-8 rounded-b-[40px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold">أهلاً بك 👋</h1>
                    <p class="opacity-80 text-sm">وعيك المالي يبدأ من هنا</p>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">
                    🎯 نقاطك: <span id="user-points">0</span>
                </div>
            </div>
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md text-center">
                <p class="text-sm opacity-90 mb-1">إجمالي المصروفات</p>
                <h2 class="text-4xl font-black mb-4"><span id="home-total">0</span> ريال</h2>
                <div class="grid grid-cols-2 gap-3 mt-2 font-bold text-[10px]">
                    <div class="bg-white/20 rounded-xl p-2">🌱 بيئي: <span id="eco-status">🟡</span></div>
                    <div class="bg-white/20 rounded-xl p-2">🇸🇦 اجتماعي: <span id="social-status">🟢</span></div>
                </div>
            </div>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-gray-800 text-lg mb-4">آخر العمليات 🔄</h3>
            <div id="transactions-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400">جاري الاتصال بالسحاب...</div>
            </div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="p-6">
            <h2 class="text-3xl font-black text-gray-800 mb-8">إضافة مصروف</h2>
            <div class="bg-white p-6 rounded-[30px] shadow-2xl space-y-6 border border-gray-100">
                <input type="number" id="input-amount" class="w-full bg-gray-50 p-5 rounded-2xl text-2xl font-bold text-center text-green-700 outline-none" placeholder="0.00">
                <input type="text" id="input-title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold" placeholder="وش شريت؟ (مثلاً: قهوة)">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCategory('need', this)" id="btn-need" class="cat-btn border-2 border-green-500 bg-green-50 p-3 rounded-2xl font-bold text-green-700">احتياج</button>
                    <button onclick="setCategory('want', this)" id="btn-want" class="cat-btn border-2 border-transparent bg-gray-50 p-3 rounded-2xl font-bold text-gray-400">رغبة</button>
                </div>
                
                <div class="space-y-4 bg-gray-50 p-5 rounded-2xl">
                    <div class="flex justify-between items-center text-sm font-bold"><span>🇸🇦 دعم محلي؟</span><input type="checkbox" id="check-local" class="w-6 h-6"></div>
                    <div class="flex justify-between items-center text-sm font-bold"><span>🌱 خيار مستدام؟</span><input type="checkbox" id="check-eco" class="w-6 h-6"></div>
                </div>
                <button onclick="processTransaction()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">تأكيد الأثر ✅</button>
            </div>
        </div>
    </div>

    <div id="page-reports" class="page">
        <div class="p-6 space-y-6">
            <h2 class="text-3xl font-black text-gray-800 mb-6 font-Tajawal">التقارير الذكية 📊</h2>
            <div class="bg-yellow-50 p-5 rounded-[25px] border border-yellow-200">
                <h4 class="font-bold text-yellow-800 text-sm mb-1">💡 نصيحة أثر:</h4>
                <p id="report-fin-text" class="text-xs text-yellow-700 font-bold italic leading-relaxed">ابدأ بالرصد لنحلل ميزانيتك في الوقت الفعلي!</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass h-24 flex justify-around items-center px-6 border-t z-50">
        <button onclick="navTo('home', this)" class="nav-btn text-green-600 flex flex-col items-center">
            <span class="text-xl">🏠</span><span class="text-[10px] font-bold">الرئيسية</span>
        </button>
        <button onclick="navTo('add', this)" class="nav-btn text-gray-400 flex flex-col items-center">
            <div class="bg-green-600 text-white p-4 rounded-2xl -mt-14 border-4 border-white"><span class="text-xl">➕</span></div>
            <span class="text-[10px] font-bold">إضافة</span>
        </button>
        <button onclick="navTo('reports', this)" class="nav-btn text-gray-400 flex flex-col items-center">
            <span class="text-xl">📊</span><span class="text-[10px] font-bold">التقارير</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات مشروعك (تأكدي من نسخها بدقة من Firebase Console)
        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جعل المتغيرات عالمية للوصول إليها من HTML
        window.selectedCategory = 'need';

        window.navTo = function(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-green-600', 'text-gray-400'));
            if(btn) btn.classList.replace('text-gray-400', 'text-green-600');
        };

        window.setCategory = function(cat, btn) {
            window.selectedCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('border-green-500', 'bg-green-50', 'text-green-700');
                b.classList.add('border-transparent', 'bg-gray-50', 'text-gray-400');
            });
            btn.classList.replace('border-transparent', 'border-green-500');
            btn.classList.add('bg-green-50', 'text-green-700');
        };

        window.processTransaction = async function() {
            const amt = document.getElementById('input-amount').value;
            const title = document.getElementById('input-title').value;
            if(!amt || !title) return alert("الرجاء إكمال البيانات ✍️");

            try {
                await addDoc(collection(db, "expenses"), {
                    amount: parseFloat(amt),
                    category: title,
                    necessity: window.selectedCategory,
                    isLocal: document.getElementById('check-local').checked,
                    isEco: document.getElementById('check-eco').checked,
                    timestamp: new Date()
                });
                alert("تم الحفظ بنجاح! ✅");
                document.getElementById('input-amount').value = ''; 
                document.getElementById('input-title').value = '';
                window.navTo('home', document.querySelectorAll('.nav-btn')[0]);
            } catch (e) {
                console.error(e);
                alert("خطأ في الحفظ: تأكدي من تفعيل Firestore Rules");
            }
        };

        // تحديث البيانات لحظياً
        onSnapshot(query(collection(db, "expenses"), orderBy("timestamp", "desc")), (snap) => {
            let total = 0, pts = 0;
            const list = document.getElementById('transactions-list'); list.innerHTML = '';
            
            snap.forEach(doc => {
                const d = doc.data();
                total += d.amount;
                pts += (d.necessity === 'need') ? 10 : 5;

                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border border-gray-50";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-green-100 p-3 rounded-2xl text-xl">${d.isEco ? '🌱' : '💰'}</div>
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm">${d.category}</h4>
                            <p class="text-[10px] text-gray-400 font-bold italic">${d.necessity === 'need' ? 'احتياج' : 'رغبة'} ${d.isLocal ? '• 🇸🇦 محلي' : ''}</p>
                        </div>
                    </div>
                    <div class="text-left font-black text-green-700 text-sm">${d.amount} ريال</div>`;
                list.appendChild(card);
            });
            
            document.getElementById('home-total').innerText = total.toLocaleString();
            document.getElementById('user-points').innerText = pts;
            if(snap.empty) list.innerHTML = '<div class="text-center py-10 text-gray-400 italic">لا توجد عمليات.. أضف أثرك الأول! 🌱</div>';
        });
    </script>
</body>
</html>
