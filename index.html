<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - Athar | النسخة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-right">

    <div id="page-home" class="page active">
        <div class="bg-gradient-to-b from-green-700 to-green-600 p-8 rounded-b-[40px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold">أهلاً بك في أثر 👋</h1>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">
                    🎯 نقاط الأثر: <span id="user-points">0</span>
                </div>
            </div>
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md">
                <p class="text-sm opacity-90 mb-1 text-center">إجمالي المصروفات</p>
                <h2 class="text-4xl font-black mb-4 text-center"><span id="home-total">0</span> <span class="text-lg">ريال</span></h2>
            </div>
        </div>
        <div class="p-6">
            <h3 class="font-bold text-gray-800 text-lg mb-4">تحركاتك الأخيرة (من السحاب)</h3>
            <div id="transactions-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400 text-sm">جاري جلب البيانات...</div>
            </div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="p-6">
            <h2 class="text-3xl font-black text-gray-800 mb-8">إضافة مصروف</h2>
            <div class="bg-white p-6 rounded-[30px] shadow-2xl space-y-6 border border-gray-100">
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-2">كم صرفت؟</label>
                    <input type="number" id="input-amount" class="w-full bg-gray-50 p-5 rounded-2xl text-2xl font-bold text-center text-green-700 outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-2">في ماذا صرفت؟</label>
                    <input type="text" id="input-title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold" placeholder="مثلاً: قهوة..">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCategory('need', this)" class="cat-btn border-2 border-green-500 bg-green-50 p-3 rounded-2xl font-bold text-green-700">احتياج</button>
                    <button onclick="setCategory('want', this)" class="cat-btn border-2 border-transparent bg-gray-50 p-3 rounded-2xl font-bold text-gray-500">رغبة</button>
                </div>
                <div class="space-y-4 bg-gray-50 p-5 rounded-2xl border border-gray-100">
                    <div class="flex items-center justify-between text-sm font-bold">
                        <span>دعم منتج محلي؟ 🇸🇦</span>
                        <input type="checkbox" id="check-local" class="w-6 h-6 accent-green-600">
                    </div>
                </div>
                <button id="save-btn" onclick="processTransaction()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">رصد الأثر سحابياً ☁️</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass h-24 flex justify-around items-center px-6 border-t border-gray-100 shadow-2xl z-50">
        <button onclick="navTo('home', this)" class="nav-btn text-green-600 flex flex-col items-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold mt-1">الرئيسية</span>
        </button>
        <button onclick="navTo('add', this)" class="nav-btn text-gray-400 flex flex-col items-center">
            <div class="bg-green-600 text-white p-4 rounded-2xl -mt-14 shadow-lg border-4 border-white transition-transform active:scale-90">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="text-[10px] font-bold mt-1">إضافة</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات مشروعك (من الصورة)
        const firebaseConfig = {
            apiKey: "AIzaSyCsIr0rEP8zfsRYdebkwSxatA9tCrHGRmQ",
            authDomain: "athar-d393a.firebaseapp.com",
            projectId: "athar-d393a",
            storageBucket: "athar-d393a.firebasestorage.app",
            messagingSenderId: "776148647810",
            appId: "1:776148647810:web:fc9f6e7b225c12a146999b",
            measurementId: "G-Y8J5NL8FTY"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let total = 0;
        let selectedCategory = 'need';

        // جعل الدوال متاحة عالمياً
        window.navTo = function(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (pageId === 'home') loadTransactions();
        };

        window.setCategory = function(cat, btn) {
            selectedCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('border-green-500', 'bg-green-50', 'text-green-700');
                b.classList.add('border-transparent', 'bg-gray-50', 'text-gray-500');
            });
            btn.classList.replace('border-transparent', 'border-green-500');
            btn.classList.replace('bg-gray-50', 'bg-green-50');
            btn.classList.replace('text-gray-500', 'text-green-700');
        };

        // دالة الحفظ السحابي
        window.processTransaction = async function() {
            const amountInput = document.getElementById('input-amount');
            const titleInput = document.getElementById('input-title');
            const saveBtn = document.getElementById('save-btn');

            if (!amountInput.value || !titleInput.value) return alert("عبّي البيانات!");

            saveBtn.innerText = "جاري الرفع للسحاب... ☁️";
            saveBtn.disabled = true;

            try {
                await addDoc(collection(db, "transactions"), {
                    title: titleInput.value,
                    amount: parseFloat(amountInput.value),
                    category: selectedCategory,
                    isLocal: document.getElementById('check-local').checked,
                    createdAt: new Date()
                });
                
                amountInput.value = ''; titleInput.value = '';
                saveBtn.innerText = "تم الحفظ بنجاح! ✅";
                setTimeout(() => {
                    saveBtn.disabled = false;
                    saveBtn.innerText = "رصد الأثر سحابياً ☁️";
                    navTo('home');
                }, 1000);
            } catch (e) {
                console.error("خطأ: ", e);
                alert("حدث خطأ في الاتصال بالسحاب");
            }
        };

        // دالة جلب البيانات من السحاب
        async function loadTransactions() {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">جاري التحديث...</div>';
            
            const q = query(collection(db, "transactions"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            list.innerHTML = '';
            total = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                total += data.amount;
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border border-gray-50";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-green-100 p-3 rounded-2xl text-xl">💰</div>
                        <div>
                            <h4 class="font-black text-gray-800 text-sm">${data.title}</h4>
                            <p class="text-[10px] text-gray-400 font-bold italic">${data.category === 'need' ? 'احتياج' : 'رغبة'}</p>
                        </div>
                    </div>
                    <div class="text-left font-black text-green-700 text-sm">${data.amount} ريال</div>
                `;
                list.appendChild(card);
            });
            document.getElementById('home-total').innerText = total.toLocaleString();
        }

        // تحميل أولي للبيانات
        loadTransactions();
    </script>
</body>
</html>
