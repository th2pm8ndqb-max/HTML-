<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر | Athar 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module">
        // استيراد أدوات Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // إعدادات المشروع الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // وظيفة حفظ البيانات في السحابة
        window.saveToCloud = async function() {
            const amt = document.getElementById('amt').value;
            const cat = document.getElementById('cat').value;
            const nec = document.getElementById('nec').value;
            
            if(!amt) return alert("فضلاً أدخل المبلغ");

            try {
                await addDoc(collection(db, "expenses"), {
                    amount: parseFloat(amt),
                    category: cat,
                    necessity: nec,
                    timestamp: new Date()
                });
                document.getElementById('amt').value = ''; // تصفير الخانة بعد الحفظ
                console.log("تم الحفظ في السحابة!");
            } catch (e) {
                console.error("خطأ في الاتصال بالسحابة: ", e);
            }
        };

        // تحديث البيانات لحظياً من السحابة
        const q = query(collection(db, "expenses"), orderBy("timestamp", "asc"), limit(15));
        onSnapshot(q, (snapshot) => {
            let amounts = [];
            let labels = [];
            let score = 100;

            snapshot.forEach((doc) => {
                const data = doc.data();
                amounts.push(data.amount);
                labels.push(new Date(data.timestamp.seconds * 1000).toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}));
                // معادلة النقاط: الضروري يزيد 5، الكماليات تنقص 10
                score += (data.necessity === 'yes' ? 5 : -10);
            });

            document.getElementById('liveScore').innerText = score;
            renderChart(amounts, labels);
        });

        let myChart;
        function renderChart(data, labels) {
            const ctx = document.getElementById('myChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'تحليل الإنفاق',
                        data: data,
                        borderColor: '#27ae60',
                        backgroundColor: 'rgba(39, 174, 96, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { scales: { y: { beginAtZero: true } } }
            });
        }
    </script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-card {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { color: #27ae60; font-size: 28px; margin-bottom: 5px; }
        .tagline { color: #95a5a6; font-size: 13px; margin-bottom: 25px; }
        
        .score-display {
            background: #fdfdfd;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            margin-bottom: 20px;
        }
        .score-display span { font-size: 12px; color: #7f8c8d; }
        .score-display strong { display: block; font-size: 40px; color: #2c3e50; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #f9f9f9;
            font-size: 15px;
            box-sizing: border-box;
        }
        .btn-save {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        .btn-save:active { transform: scale(0.98); }
        canvas { margin-top: 25px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>أثر 🌱</h1>
    <p class="tagline">تطبيق الإنفاق السحابي المستدام</p>

    <div class="score-display">
        <span>نقاط الأثر اللحظية</span>
        <strong id="liveScore">100</strong>
    </div>

    <input type="number" id="amt" placeholder="المبلغ (ريال)">
    
    <select id="cat">
        <option value="food">🍽️ طعام</option>
        <option value="coffee">☕ قهوة</option>
        <option value="study">📚 دراسة</option>
        <option value="fun">🎮 ترفيه</option>
    </select>

    <select id="nec">
        <option value="yes">ضروري ✅</option>
        <option value="no">كماليات ❌</option>
    </select>

    <button class="btn-save" onclick="saveToCloud()">حفظ في السحابة</button>

    <canvas id="myChart" height="150"></canvas>
</div>
