<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثر - Athar | النسخة السحابية الخاصة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-right">

    <div id="page-home" class="page active">
        <div class="bg-gradient-to-b from-green-700 to-green-600 p-8 rounded-b-[40px] text-white shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold">أهلاً بك في أثر 👋</h1>
                    <p class="opacity-80 text-sm italic">بياناتك محفوظة بسحابك الخاص</p>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold border border-white/30">
                    🎯 نقاط الأثر: <span id="user-points">0</span>
                </div>
            </div>
            
            <div class="bg-white/10 p-6 rounded-3xl border border-white/20 backdrop-blur-md">
                <p class="text-sm opacity-90 mb-1 text-center">إجمالي مصروفاتك</p>
                <h2 class="text-4xl font-black mb-4 text-center"><span id="home-total">0</span> <span class="text-lg">ريال</span></h2>
                <div class="grid grid-cols-2 gap-3 mt-2 font-bold text-[10px]">
                    <div class="bg-white/20 rounded-xl p-2 text-center border border-white/10">الأثر البيئي: <span id="eco-status">🟡</span></div>
                    <div class="bg-white/20 rounded-xl p-2 text-center border border-white/10">الأثر الاجتماعي: <span id="social-status">🟢</span></div>
                </div>
            </div>
        </div>

        <div class="p-6">
            <h3 class="font-bold text-gray-800 text-lg mb-4">تحركاتك الأخيرة</h3>
            <div id="transactions-list" class="space-y-4">
                <div class="text-center py-10 text-gray-400 text-sm">جاري تحميل بيانات جهازك... ✨</div>
            </div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="p-6">
            <h2 class="text-3xl font-black text-gray-800 mb-8">إضافة مصروف</h2>
            <div class="bg-white p-6 rounded-[30px] shadow-2xl space-y-6 border border-gray-100">
                <input type="number" id="input-amount" class="w-full bg-gray-50 p-5 rounded-2xl text-2xl font-bold text-center text-green-700 outline-none" placeholder="0.00">
                <input type="text" id="input-title" class="w-full bg-gray-50 p-4 rounded-2xl outline-none font-bold" placeholder="وش شريت؟">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCategory('need', this)" class="cat-btn border-2 border-green-500 bg-green-50 p-3 rounded-2xl font-bold text-green-700">احتياج</button>
                    <button onclick="setCategory('want', this)" class="cat-btn border-2 border-transparent bg-gray-50 p-3 rounded-2xl font-bold text-gray-500">رغبة</button>
                </div>

                <div class="space-y-4 bg-gray-50 p-5 rounded-2xl">
                    <div class="flex justify-between items-center text-sm font-bold"><span>🇸🇦 دعم محلي؟</span><input type="checkbox" id="check-local" class="w-6 h-6 accent-green-600"></div>
                    <div class="flex justify-between items-center text-sm font-bold"><span>🌱 خيار مستدام؟</span><input type="checkbox" id="check-eco" class="w-6 h-6 accent-green-600"></div>
                </div>
                <button onclick="processTransaction()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">تأكيد الأثر ✅</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass h-24 flex justify-around items-center px-6 border-t z-50">
        <button onclick="navTo('home', this)" class="nav-btn text-green-600 flex flex-col items-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold mt-1">الرئيسية</span>
        </button>
        <button onclick="navTo('add', this)" class="nav-btn text-gray-400 flex flex-col items-center">
            <div class="bg-green-600 text-white p-4 rounded-2xl -mt-14 shadow-lg border-4 border-white transition-transform active:scale-90"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg></div>
            <span class="text-[10px] font-bold mt-1">إضافة</span>
        </button>
        <button onclick="navTo('home', this)" class="nav-btn text-gray-400 flex flex-col items-center opacity-50">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-bold mt-1">التقارير</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMP7Xx0YMTI9SiETE3lhjm_eRg8SX_iUw",
            authDomain: "athar-pro.firebaseapp.com",
            projectId: "athar-pro",
            storageBucket: "athar-pro.firebasestorage.app",
            messagingSenderId: "958994453336",
            appId: "1:958994453336:web:d4488297a848930285cb2d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // إنشاء أو جلب معرف الجهاز الفريد
        if (!localStorage.getItem('device_id')) {
            localStorage.setItem('device_id', 'dev_' + Math.random().toString(36).substr(2, 9));
        }
        const deviceId = localStorage.getItem('device_id');

        window.selectedCategory = 'need';

        window.navTo = function(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-green-600', 'text-gray-400'));
            if(btn) btn.classList.replace('text-gray-400', 'text-green-600');
        };

        window.setCategory = function(cat, btn) {
            window.selectedCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('border-green-500', 'bg-green-50', 'text-green-700');
                b.classList.add('border-transparent', 'bg-gray-50', 'text-gray-500');
            });
            btn.classList.replace('border-transparent', 'border-green-500');
            btn.classList.add('bg-green-50', 'text-green-700');
        };

        window.processTransaction = async function() {
            const amt = document.getElementById('input-amount').value;
            const title = document.getElementById('input-title').value;
            if (!amt || !title) return alert("اكمل البيانات ✍️");

            try {
                await addDoc(collection(db, "expenses"), {
                    userId: deviceId, // هنا السر: نربط العملية بمعرف الجهاز
                    amount: parseFloat(amt),
                    category: title,
                    necessity: window.selectedCategory,
                    isLocal: document.getElementById('check-local').checked,
                    isEco: document.getElementById('check-eco').checked,
                    timestamp: new Date()
                });
                document.getElementById('input-amount').value = ''; 
                document.getElementById('input-title').value = '';
                window.navTo('home', document.querySelectorAll('.nav-btn')[0]);
            } catch (e) { alert("خطأ في الاتصال"); }
        };

        // جلب العمليات الخاصة بهذا الجهاز فقط (Query based on userId)
        const q = query(
            collection(db, "expenses"), 
            where("userId", "==", deviceId), 
            orderBy("timestamp", "desc")
        );

        onSnapshot(q, (snap) => {
            let total = 0, pts = 0;
            const list = document.getElementById('transactions-list'); list.innerHTML = '';
            
            snap.forEach(doc => {
                const d = doc.data();
                total += d.amount;
                pts += (d.necessity === 'need') ? 10 : 5;
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border border-gray-50";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-green-100 p-3 rounded-2xl text-xl">${d.isEco ? '🌱' : '💰'}</div>
                        <div><h4 class="font-black text-gray-800 text-sm">${d.category}</h4><p class="text-[10px] text-gray-400 font-bold italic">${d.necessity === 'need' ? 'احتياج' : 'رغبة'}</p></div>
                    </div>
                    <div class="text-left font-black text-green-700 text-sm">${d.amount} ريال</div>`;
                list.appendChild(card);
            });
            document.getElementById('home-total').innerText = total.toLocaleString();
            document.getElementById('user-points').innerText = pts;
            if(snap.empty) list.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">أهلاً بك! ابدأ بإضافة مصروفاتك..</div>';
        });
    </script>
</body>
</html>
